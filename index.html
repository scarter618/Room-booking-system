<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room Booking · Oqtima</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.26.1/lib/msal-browser.min.js" onerror="window.__msalFailed=true"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f4f4;--s1:#ffffff;--s2:#f4f4f4;--s3:#e8e8e8;
  --bdr:rgba(0,0,0,0.09);--bdr2:rgba(0,0,0,0.14);
  --brand:#d94000;--brand2:#c03800;
  --accent:#d94000;--ad:rgba(217,64,0,0.08);--ab:rgba(217,64,0,0.2);
  --red:#cc0022;--rd:rgba(204,0,34,0.08);--rb:rgba(204,0,34,0.2);
  --green:#1db300;--gd:rgba(29,179,0,0.08);--gb:rgba(29,179,0,0.2);
  --amber:#f59e0b;--tx:#1a1a1a;--tx2:#5a6070;--tx3:#9aa0aa;
  --ff:'Syne',sans-serif;--fm:'JetBrains Mono',monospace;--r:10px;--r2:14px;
}
html,body{min-height:100%;background:var(--bg);color:var(--tx);font-family:var(--ff)}
a{color:var(--accent);text-decoration:none}
input,button{font-family:inherit}
.nav-banner{width:100%;height:72px;background:#d94000;overflow:hidden;position:sticky;top:0;z-index:101;flex-shrink:0}
.nav-banner img{width:100%;height:100%;object-fit:cover;object-position:left center;display:block}
.nav-logo-overlay{position:absolute;top:0;left:0;height:72px;display:flex;align-items:center;padding:0 20px}
.nav-logo-overlay img{height:44px;width:auto}
.nav{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:52px;background:#ffffff;border-bottom:2px solid #d94000;position:sticky;top:72px;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.nav-brand{display:none}
.nav-tabs{display:flex;gap:4px}
.nav-tab{padding:6px 16px;border-radius:7px;border:none;cursor:pointer;font-family:var(--ff);font-size:13px;font-weight:600;color:var(--tx2);background:transparent;transition:all .15s}
.nav-tab:hover{color:var(--tx);background:var(--s2)}
.nav-tab.active{color:#d94000;background:rgba(217,64,0,0.08);font-weight:800}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-user{font-size:12px;color:var(--tx2);font-family:var(--fm)}
.btn-nav{background:none;border:1px solid var(--bdr2);color:var(--tx2);padding:5px 14px;border-radius:6px;font-size:12px;cursor:pointer;transition:all .15s;font-weight:600}
.btn-nav:hover{border-color:var(--red);color:var(--red)}
.main{padding:28px 28px;max-width:1400px;margin:0 auto}
.btn{padding:10px 22px;border-radius:var(--r);border:none;cursor:pointer;font-family:var(--ff);font-size:13px;font-weight:700;transition:all .15s;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:#d94000;color:#fff}
.btn-primary:hover{background:#c03800}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:var(--s2);color:var(--tx2);border:1px solid var(--bdr2)}
.btn-ghost:hover{background:var(--s3);color:var(--tx)}
.btn-danger{background:var(--rd);color:var(--red);border:1px solid var(--rb)}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-full{width:100%;justify-content:center}
.btn-sm{padding:5px 12px;font-size:12px}
.icon-btn{background:var(--s2);border:1px solid var(--bdr);color:var(--tx2);width:32px;height:32px;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:16px}
.icon-btn:hover{color:var(--tx);background:var(--s3)}
.form-group{margin-bottom:14px}
.form-label{font-size:11px;font-weight:700;color:var(--tx2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;display:block}
.form-input{width:100%;padding:10px 14px;border-radius:var(--r);background:var(--bg);border:1px solid var(--bdr2);color:var(--tx);font-family:var(--fm);font-size:13px;outline:none;transition:border-color .15s}
.form-input:focus{border-color:#d94000;box-shadow:0 0 0 3px rgba(217,64,0,0.1)}
.form-input::placeholder{color:var(--tx3)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-section{font-size:11px;font-weight:700;color:var(--tx2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.form-section::before{content:'';display:block;width:14px;height:2px;background:#d94000}
.setup-wrap{max-width:520px;margin:48px auto;background:#ffffff;border:1px solid var(--bdr2);border-radius:18px;padding:38px;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
.setup-logo{font-size:28px;margin-bottom:6px}
.setup-title{font-size:21px;font-weight:800;margin-bottom:4px}
.setup-sub{color:var(--tx2);font-size:13px;margin-bottom:26px}
.hint-box{padding:14px 16px;background:#f0f9ff;border:1px solid rgba(0,100,200,0.15);border-radius:var(--r);font-size:12px;color:#4a6a8a;line-height:1.7;margin-top:16px}
.hint-box code{font-family:var(--fm);color:#0050aa;font-size:11px;background:rgba(0,80,170,.08);padding:1px 5px;border-radius:4px;word-break:break-all}
.divider-or{text-align:center;font-size:12px;color:var(--tx3);margin:14px 0;position:relative}
.divider-or::before,.divider-or::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--bdr)}
.divider-or::before{left:0}.divider-or::after{right:0}
.card{background:#ffffff;border:1px solid var(--bdr);border-radius:var(--r2);padding:22px;margin-bottom:16px;box-shadow:0 1px 6px rgba(0,0,0,0.04)}
.card-title{font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card-title::before{content:'';display:block;width:3px;height:14px;border-radius:2px;background:#d94000}
.error-box{padding:11px 15px;background:var(--rd);border:1px solid var(--rb);border-radius:var(--r);color:var(--red);font-size:13px;margin-bottom:12px}
.success-box{padding:11px 15px;background:var(--ad);border:1px solid var(--ab);border-radius:var(--r);color:var(--accent);font-size:13px;margin-bottom:12px}
.badge{display:inline-flex;align-items:center;gap:7px;padding:7px 16px;border-radius:20px;font-size:12px;font-weight:800;letter-spacing:.04em}
.badge-available{background:rgba(255,255,255,0.2);color:#ffffff;border:1.5px solid rgba(255,255,255,0.4)}
.badge-busy{background:rgba(255,255,255,0.15);color:#ffffff;border:1.5px solid rgba(255,255,255,0.3)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-available{background:#ffffff;animation:pg 2s infinite}
.dot-busy{background:#ffffff;animation:pr 2s infinite}
@keyframes pg{0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,.6)}50%{box-shadow:0 0 0 8px rgba(255,255,255,0)}}
@keyframes pr{0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,.5)}50%{box-shadow:0 0 0 6px rgba(255,255,255,0)}}
.panel-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;height:calc(100vh - 200px)}
.room-panel{border-radius:24px;overflow:hidden;transition:all .4s;position:relative;min-height:380px;height:100%;display:flex;flex-direction:column}
.room-panel.available{background:linear-gradient(160deg,#1db300 0%,#178f00 100%);border:none;box-shadow:0 12px 48px rgba(29,179,0,0.35),0 3px 14px rgba(0,0,0,0.1)}
.room-panel.busy{background:linear-gradient(160deg,#cc0022 0%,#a80018 100%);border:none;box-shadow:0 12px 48px rgba(204,0,34,0.35),0 3px 14px rgba(0,0,0,0.1)}
.room-panel.loading-panel{background:#ffffff;border:1px solid var(--bdr);min-height:380px}
.rp-status-bar{height:7px;width:100%}
.rp-status-bar.available{background:rgba(255,255,255,0.25)}
.rp-status-bar.busy{background:rgba(255,255,255,0.15)}
.rp-head{padding:30px 32px 20px;display:flex;justify-content:space-between;align-items:flex-start}
.rp-name{font-size:clamp(24px,3vw,36px);font-weight:800;letter-spacing:-.02em;color:#ffffff}
.rp-cap{font-size:13px;color:rgba(255,255,255,0.7);margin-top:6px;display:flex;align-items:center;gap:4px}
.rp-body{padding:0 32px 26px;flex:1;display:flex;flex-direction:column;justify-content:center}
.rp-div{border:none;border-top:1px solid rgba(255,255,255,0.15);margin:0 0 24px}
.rp-lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:.15em;margin-bottom:10px}
.rp-mtitle{font-size:24px;font-weight:800;line-height:1.3;margin-bottom:10px;color:#ffffff}
.rp-meta{font-family:var(--fm);font-size:14px;color:rgba(255,255,255,0.75)}
.rp-free{font-size:clamp(42px,5vw,64px);font-weight:800;color:#ffffff;margin-bottom:4px;letter-spacing:-.03em;line-height:1}
.rp-free-sub{font-size:15px;color:rgba(255,255,255,0.8);margin-bottom:4px;font-weight:600}
.rp-next{font-size:14px;color:rgba(255,255,255,0.8);margin-top:16px;padding:14px 18px;background:rgba(0,0,0,0.12);border-radius:12px;border:1px solid rgba(255,255,255,0.15)}
.rp-next strong{color:#ffffff}
.progress{height:6px;background:rgba(0,0,0,0.2);border-radius:3px;margin-top:16px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width 1s linear;background:rgba(255,255,255,0.5)}
.rp-foot{padding:20px 32px;border-top:1px solid rgba(255,255,255,0.15);display:flex;gap:10px;background:rgba(0,0,0,0.12);margin-top:auto}
.rp-time-left{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:14px;font-family:var(--fm);font-size:13px;font-weight:600;margin-top:12px}
.rp-time-left.busy{background:rgba(0,0,0,0.2);color:#fff;border:1px solid rgba(255,255,255,0.2)}
/* QUICK BOOK MODAL */
.qb-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.qb-modal{background:#ffffff;border:1px solid rgba(0,0,0,0.1);border-radius:24px;padding:36px;width:100%;max-width:440px;box-shadow:0 24px 80px rgba(0,0,0,0.18)}
.qb-title{font-size:22px;font-weight:800;margin-bottom:4px;color:#0a0a0a}
.qb-sub{font-size:13px;color:var(--tx2);margin-bottom:24px}
.qb-dur-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.qb-dur{padding:14px 8px;text-align:center;border-radius:12px;border:1.5px solid var(--bdr2);cursor:pointer;font-size:14px;font-weight:700;font-family:var(--fm);transition:all .15s;color:var(--tx2);background:#fff}
.qb-dur:hover,.qb-dur.sel{border-color:#d94000;background:rgba(217,64,0,0.08);color:#d94000}
.booking-layout{display:grid;grid-template-columns:260px 1fr;gap:20px;align-items:start}
.room-opt{padding:11px 14px;border-radius:var(--r);border:1.5px solid var(--bdr);cursor:pointer;transition:all .15s;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.room-opt:hover,.room-opt.sel{border-color:#d94000;background:rgba(217,64,0,0.06)}
.room-opt-name{font-weight:700;font-size:14px}
.ros-available{color:var(--accent);font-size:11px;font-weight:600}
.ros-busy{color:var(--red);font-size:11px;font-weight:600}
.date-nav{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.date-nav-btn{background:var(--s2);border:1px solid var(--bdr);color:var(--tx2);width:30px;height:30px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:15px}
.date-nav-btn:hover{background:var(--s3);color:var(--tx)}
.date-display{flex:1;text-align:center;font-weight:700;font-size:14px}
.tl-labels{display:flex;justify-content:space-between;margin-bottom:5px}
.tl-hour{font-family:var(--fm);font-size:10px;color:var(--tx3)}
.tl-track{height:42px;background:var(--s2);border-radius:7px;position:relative;overflow:hidden;border:1px solid var(--bdr)}
.tl-now{position:absolute;top:0;bottom:0;width:2px;background:var(--amber);z-index:2}
.tl-event{position:absolute;top:5px;bottom:5px;border-radius:4px;display:flex;align-items:center;padding:0 7px;overflow:hidden;font-size:10px;font-weight:600;white-space:nowrap;background:var(--red);color:#fff}
.dur-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.dur-btn{padding:9px 6px;text-align:center;border-radius:8px;border:1.5px solid var(--bdr);cursor:pointer;font-size:13px;font-weight:600;font-family:var(--fm);transition:all .15s;color:var(--tx2);background:transparent}
.dur-btn:hover,.dur-btn.sel{border-color:#d94000;background:rgba(217,64,0,0.08);color:#d94000}
.slot-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;max-height:180px;overflow-y:auto}
.slot-btn{padding:8px 5px;text-align:center;border-radius:7px;border:1px solid var(--bdr);cursor:pointer;font-family:var(--fm);font-size:11px;transition:all .15s;color:var(--tx2);background:transparent}
.slot-btn:hover{background:var(--ad);border-color:rgba(0,212,177,.3);color:var(--tx)}
.slot-btn.sel{background:rgba(217,64,0,0.08);border-color:#d94000;color:#d94000}
.slot-btn.busy{background:var(--rd);color:var(--tx3);cursor:not-allowed;opacity:.5}
.bd{display:flex;margin-bottom:16px;background:var(--s2);border-radius:var(--r);overflow:hidden;border:1px solid var(--bdr)}
.bd-item{padding:11px 14px;flex:1;border-right:1px solid var(--bdr)}
.bd-item:last-child{border-right:none}
.bd-lbl{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
.bd-val{font-weight:700;font-size:13px;font-family:var(--fm)}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.stat-card{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r2);padding:18px 20px}
.stat-val{font-size:30px;font-weight:800;font-family:var(--fm)}
.stat-lbl{font-size:11px;color:var(--tx2);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-top:4px}
.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.ev-list{display:flex;flex-direction:column;gap:7px;margin-top:14px}
.ev-item{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:var(--s2);border-radius:var(--r);border:1px solid var(--bdr)}
.ev-item.cur{border-color:var(--rb);background:var(--rd)}
.ev-title{font-weight:700;font-size:13px;margin-bottom:2px}
.ev-meta{font-family:var(--fm);font-size:11px;color:var(--tx2)}
.ev-org{font-size:11px;color:var(--tx3);margin-top:1px}
.empty{text-align:center;padding:26px;color:var(--tx3);font-size:13px}
.picker-wrap{max-width:560px;margin:48px auto;background:#ffffff;border:1px solid var(--bdr2);border-radius:18px;padding:38px;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
.picker-room{padding:13px 16px;border-radius:var(--r);border:1.5px solid var(--bdr);cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;transition:all .15s}
.picker-room:hover{border-color:rgba(0,212,177,.3);background:rgba(0,212,177,.04)}
.picker-room.sel{border-color:#d94000;background:rgba(217,64,0,0.06)}
.picker-room.dis{opacity:.35;cursor:not-allowed;pointer-events:none}
.chk{width:22px;height:22px;border-radius:5px;border:2px solid var(--bdr2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;transition:all .15s;flex-shrink:0;color:#07111e}
.chk.sel{background:#d94000;border-color:#d94000}
.loading{text-align:center;padding:60px 20px;color:var(--tx2)}
.spinner{width:32px;height:32px;border:3px solid var(--s3);border-top-color:#d94000;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){.panel-grid,.admin-grid,.booking-layout,.stats-row{grid-template-columns:1fr}.panel-grid{height:auto}.nav-tabs{display:none}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const App=(()=>{
let S={view:'setup',config:null,msalInstance:null,account:null,token:null,rooms:[],discovered:[],picked:[],selRoom:0,bookDate:new Date(),bookStart:null,bookDur:60,bookMsg:null,err:null,refreshId:null,clockId:null,qb:null,qbDur:30,qbErr:null};

async function loadCfg(){try{const r=await window.storage.get('oq-rooms-cfg');if(r)return JSON.parse(r.value);}catch(e){}return null;}
async function saveCfg(c){try{await window.storage.set('oq-rooms-cfg',JSON.stringify(c));}catch(e){}}

async function initMsal(tid,cid){
  if(window.__msalFailed||!window.msal)return false;
  try{
    S.msalInstance=new msal.PublicClientApplication({auth:{clientId:cid,authority:`https://login.microsoftonline.com/${tid}`,redirectUri:location.href.split('?')[0].split('#')[0]},cache:{cacheLocation:'sessionStorage'}});
    await S.msalInstance.initialize();
    return true;
  }catch(e){console.error('MSAL init error:',e);return false;}
}
function isMobile(){return/Mobi|Android|iPad|iPhone|Tablet/i.test(navigator.userAgent)||window.innerWidth<900;}
async function signIn(tid,cid){
  const ok=await initMsal(tid,cid);
  if(!ok)throw new Error('MSAL library failed to load');
  const scopes=['https://graph.microsoft.com/Calendars.ReadWrite','https://graph.microsoft.com/Place.Read.All'];
  if(isMobile()){
    // Save config for after redirect returns
    sessionStorage.setItem('oq-pending-cfg',JSON.stringify({tenantId:tid,clientId:cid}));
    await S.msalInstance.loginRedirect({scopes});
    return null; // page will reload after redirect
  }
  const r=await S.msalInstance.loginPopup({scopes});
  S.account=r.account;return r.accessToken;
}
async function getToken(){
  if(S.token)return S.token;
  if(!S.msalInstance)throw new Error('Not authenticated');
  try{const r=await S.msalInstance.acquireTokenSilent({scopes:['https://graph.microsoft.com/Calendars.ReadWrite'],account:S.account});return r.accessToken;}
  catch(e){const r=await S.msalInstance.acquireTokenPopup({scopes:['https://graph.microsoft.com/Calendars.ReadWrite'],account:S.account});return r.accessToken;}
}
async function gGet(p,tk){
  const t=tk||await getToken();
  const r=await fetch(`https://graph.microsoft.com/v1.0${p}`,{headers:{Authorization:`Bearer ${t}`}});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e?.error?.message||`HTTP ${r.status}`);}
  return r.json();
}
async function gPost(p,body){
  const t=await getToken();
  const r=await fetch(`https://graph.microsoft.com/v1.0${p}`,{method:'POST',headers:{Authorization:`Bearer ${t}`,'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e?.error?.message||`HTTP ${r.status}`);}
  return r.status===204?null:r.json();
}
async function gDelete(p){const t=await getToken();const r=await fetch(`https://graph.microsoft.com/v1.0${p}`,{method:'DELETE',headers:{Authorization:`Bearer ${t}`}});if(!r.ok)throw new Error(`HTTP ${r.status}`);}

async function discoverRooms(tk){
  try{const d=await gGet('/places/microsoft.graph.room?$top=100&$select=displayName,emailAddress,capacity,building,floorNumber',tk);
    return(d.value||[]).map(r=>({name:r.displayName||r.emailAddress,email:r.emailAddress,capacity:r.capacity||'',building:r.building||'',floor:r.floorNumber||''}));}
  catch(e){return[];}
}
async function getRoomEvents(email,date){
  const s=new Date(date);s.setHours(0,0,0,0);const e=new Date(date);e.setHours(23,59,59,999);
  const d=await gGet(`/users/${encodeURIComponent(email)}/calendarView?startDateTime=${s.toISOString()}&endDateTime=${e.toISOString()}&$orderby=start/dateTime&$top=50`);
  return d.value||[];
}
async function createBooking(re,subj,start,end){
  return gPost('/me/calendar/events',{subject:subj,start:{dateTime:start.toISOString().replace('Z',''),timeZone:'UTC'},end:{dateTime:end.toISOString().replace('Z',''),timeZone:'UTC'},attendees:[{emailAddress:{address:re},type:'required'}]});
}
async function cancelEvent(re,eid){await gDelete(`/users/${encodeURIComponent(re)}/calendar/events/${eid}`);}

const parseT=s=>new Date(s.endsWith('Z')?s:s+'Z');
const fmt=d=>d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
const fmtDate=d=>d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
const fmtShort=d=>d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
const now=()=>new Date();
const getCur=evs=>{const n=now();return evs.find(e=>parseT(e.start.dateTime)<=n&&parseT(e.end.dateTime)>n)||null;};
const getNxt=evs=>{const n=now();return evs.filter(e=>parseT(e.start.dateTime)>n).sort((a,b)=>parseT(a.start.dateTime)-parseT(b.start.dateTime))[0]||null;};
const minsLeft=s=>Math.max(0,Math.round((parseT(s)-now())/60000));
const prog=ev=>{const s=parseT(ev.start.dateTime).getTime(),e=parseT(ev.end.dateTime).getTime(),n=now().getTime();return Math.min(100,Math.max(0,(n-s)/(e-s)*100));};
const isBusy=(evs,s,e)=>evs.some(ev=>!(e<=parseT(ev.start.dateTime)||s>=parseT(ev.end.dateTime)));
const tkKey=d=>`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}-${d.getHours()}-${d.getMinutes()}`;
const fromKey=k=>{const[y,mo,d,h,m]=k.split('-').map(Number);return new Date(y,mo,d,h,m,0);};

async function loadRoom(i,date){
  S.rooms[i]={...(S.rooms[i]||{}),loading:true,error:null};render();
  try{S.rooms[i].events=await getRoomEvents(S.config.rooms[i].email,date);S.rooms[i].loading=false;}
  catch(e){S.rooms[i]={events:[],loading:false,error:e.message};}
  render();
}
async function loadAll(date){await Promise.all(S.config.rooms.map((_,i)=>loadRoom(i,date)));}

function render(){
  const app=document.getElementById('app');if(!app)return;
  if(S.view==='setup'){app.innerHTML=rSetup();bindSetup();return;}
  if(S.view==='discovering'){app.innerHTML=rDisc();return;}
  if(S.view==='picker'){app.innerHTML=rPicker();bindPicker();return;}
  app.innerHTML=rNav()+`<div class="main">${S.view==='panel'?rPanel():S.view==='booking'?rBooking():rAdmin()}</div>`;
  bindMain();
}

function rSetup(){
  const uri=location.href.split('?')[0].split('#')[0];
  return`<div class="main"><div class="setup-wrap">
    <div class="setup-logo">◈</div>
    <div class="setup-title">Room Booking System</div>
    <div class="setup-sub">Rooms are discovered automatically from your Entra ID tenant</div>
    ${S.err?`<div class="error-box">${S.err}</div>`:''}
    <div class="form-section">Entra ID App Registration</div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Tenant ID</label><input class="form-input" id="s-tid" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"></div>
      <div class="form-group"><label class="form-label">Client ID</label><input class="form-input" id="s-cid" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"></div>
    </div>
    <button class="btn btn-primary btn-full" id="btn-signin">Sign in with Microsoft → Discover Rooms</button>
    <div class="divider-or">or use a Graph Explorer token</div>
    <div class="form-group"><label class="form-label">Access Token</label>
      <input class="form-input" id="s-tok" type="password" placeholder="eyJ0eX… (needs Calendars.ReadWrite + Place.Read.All)"></div>
    <button class="btn btn-ghost btn-full" id="btn-tok">Connect with Token → Discover Rooms</button>
    <div class="hint-box">
      <strong style="color:var(--accent)">One-time Entra ID setup:</strong><br>
      1. <a href="https://entra.microsoft.com/#view/Microsoft_AAD_RegisteredApps" target="_blank">entra.microsoft.com</a> → App registrations → New registration<br>

  </div></div>`;
}

function rDisc(){return`<div class="main" style="padding-top:80px"><div class="loading"><div class="spinner"></div><div style="font-size:15px;font-weight:700;margin-bottom:6px">Discovering room resources…</div><div style="font-size:12px;color:var(--tx3)">Reading your Microsoft 365 Places directory</div></div></div>`;}

function rPicker(){
  const rooms=S.discovered;
  return`<div class="main"><div class="picker-wrap">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:22px">
      <button class="icon-btn" id="btn-back">←</button>
      <div><div style="font-size:19px;font-weight:800">Select Rooms</div>
        <div style="font-size:13px;color:var(--tx2);margin-top:2px">${rooms.length} room${rooms.length!==1?'s':''} found · select up to 2</div></div>
    </div>
    ${S.err?`<div class="error-box">${S.err}</div>`:''}
    ${rooms.length===0?`<div class="empty" style="padding:20px 0">No room resources found.<br><span style="color:var(--tx3);font-size:12px">Check Exchange Online room configuration and Place.Read.All consent.</span></div>`:''}
    ${rooms.map((r,i)=>{
      const sel=S.picked.includes(i),dis=!sel&&S.picked.length>=2;
      return`<div class="picker-room${sel?' sel':''}${dis?' dis':''}" onclick="A.togglePick(${i})">
        <div><div style="font-weight:700;font-size:14px">${r.name}</div>
          <div style="font-family:var(--fm);font-size:11px;color:var(--tx3);margin-top:2px">${r.email}</div>
          ${r.building?`<div style="font-size:11px;color:var(--tx3)">${r.building}${r.floor?' · Floor '+r.floor:''}</div>`:''}</div>
        <div style="display:flex;align-items:center;gap:10px">
          ${r.capacity?`<span style="font-size:12px;color:var(--tx2)">&#128101; ${r.capacity}</span>`:''}
          <div class="chk${sel?' sel':''}">${sel?'&#10003;':''}</div>
        </div>
      </div>`;
    }).join('')}
    ${rooms.length>0?`<button class="btn btn-primary btn-full" id="btn-use" style="margin-top:10px" ${S.picked.length===0?'disabled':''}>Use ${S.picked.length} selected room${S.picked.length!==1?'s':''}</button>`:''}
  </div></div>`;
}

function rPanel(){
  const n=now();
  return`${rQB()}<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
    <div><h2 style="font-size:24px;font-weight:800">Room Status</h2>
      <div style="color:var(--tx2);font-size:13px;margin-top:3px">${fmtDate(n)} &nbsp;&middot;&nbsp; <span id="pclock" style="font-family:var(--fm)">${fmt(n)}</span>
      <span style="margin-left:12px;font-size:11px;color:var(--tx3)">&#8635; auto-refreshes every 30s</span></div></div>
    <button class="icon-btn" id="btn-ref" title="Refresh now">&#8635;</button>
  </div><div class="panel-grid">${S.config.rooms.map((_,i)=>rRP(i)).join('')}</div>`;
}

function rRP(i){
  const room=S.config.rooms[i],d=S.rooms[i]||{events:[],loading:true};
  if(d.loading)return`<div class="room-panel loading-panel"><div class="loading"><div class="spinner"></div>Loading ${room.name}&hellip;</div></div>`;
  if(d.error)return`<div class="room-panel loading-panel"><div style="padding:24px"><div class="error-box">&#9888; ${d.error}</div><button class="btn btn-ghost btn-sm" onclick="A.retry(${i})">Retry</button></div></div>`;
  const ev=d.events,cur=getCur(ev),nxt=getNxt(ev),st=cur?'busy':'available';
  let body='';
  if(cur){
    const ml=minsLeft(cur.end.dateTime),pr=prog(cur);
    const hrs=Math.floor(ml/60),mins=ml%60;
    const tleft=hrs>0?`${hrs}h ${mins}m left`:`${mins} min left`;
    body=`<div class="rp-lbl" style="color:rgba(255,51,89,0.7)">NOW IN USE</div>
      <div class="rp-mtitle">${cur.subject||'Meeting in progress'}</div>
      <div class="rp-meta">${fmt(parseT(cur.start.dateTime))} &ndash; ${fmt(parseT(cur.end.dateTime))}</div>
      <div class="rp-time-left busy">&#9679; ${tleft}</div>
      <div class="progress"><div class="progress-fill" style="width:${pr}%"></div></div>
      ${nxt?`<div class="rp-next"><div style="font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.12em;margin-bottom:5px">UP NEXT</div><strong>${nxt.subject||'Meeting'}</strong> &nbsp;<span style="font-family:var(--fm);font-size:12px;color:var(--tx2)">${fmt(parseT(nxt.start.dateTime))} &ndash; ${fmt(parseT(nxt.end.dateTime))}</span></div>`:''}`;
  }else if(nxt){
    const ml=minsLeft(nxt.start.dateTime);
    const hrs=Math.floor(ml/60),mins=ml%60;
    const tfree=hrs>0?`Free for ${hrs}h ${mins}m`:`Free for ${mins} min`;
    body=`<div class="rp-free">Available</div>
      <div class="rp-free-sub">${tfree}</div>
      <div class="rp-next"><div style="font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.12em;margin-bottom:5px">UP NEXT</div><strong>${nxt.subject||'Meeting'}</strong> &nbsp;<span style="font-family:var(--fm);font-size:12px;color:var(--tx2)">${fmt(parseT(nxt.start.dateTime))} &ndash; ${fmt(parseT(nxt.end.dateTime))}</span></div>`;
  }else{
    body=`<div class="rp-free">Available</div><div class="rp-free-sub">Free all day</div>
      <div class="rp-next" style="color:var(--tx3);background:transparent;border-color:transparent">No upcoming meetings today</div>`;
  }
  return`<div class="room-panel ${st}">
    <div class="rp-status-bar ${st}"></div>
    <div class="rp-head">
      <div><div class="rp-name">${room.name}</div>${room.capacity?`<div class="rp-cap">&#128101; ${room.capacity} people</div>`:''}</div>
      <div class="badge badge-${st}"><div class="dot dot-${st}"></div>${st==='busy'?'IN USE':'AVAILABLE'}</div>
    </div>
    <hr class="rp-div"><div class="rp-body">${body}</div>
    <div class="rp-foot">
      <button class="btn btn-sm${st==='available'?' btn-primary':' btn-ghost'}" onclick="A.openQB(${i})" ${st==='busy'?'disabled':''} style="${st==='available'?'background:#44ff00;color:#07111e;font-weight:800':''}">&#9889; Book Now</button>
      <button class="btn btn-ghost btn-sm" onclick="A.goBook(${i})" style="background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.3);color:#fff">Schedule</button>
    </div>
  </div>`;
}

function rQB(){
  if(S.qb===null)return'';
  const room=S.config.rooms[S.qb],dur=S.qbDur||30;
  const s=new Date(),e=new Date(s.getTime()+dur*60000);
  return`<div class="qb-overlay" onclick="if(event.target===this)A.closeQB()">
    <div class="qb-modal">
      <div class="qb-title">&#9889; Book Now</div>
      <div class="qb-sub">${room.name} &nbsp;&middot;&nbsp; Starting ${fmt(s)}</div>
      <div class="form-group"><label class="form-label">Meeting Title</label>
        <input class="form-input" id="qb-title" placeholder="e.g. Quick sync, Client call…" autofocus></div>
      <div class="form-label" style="margin-bottom:8px">Duration</div>
      <div class="qb-dur-grid">
        ${[15,30,45,60].map(d=>`<div class="qb-dur${dur===d?' sel':''}" onclick="A.setQBDur(${d})">${d}m</div>`).join('')}
      </div>
      <div style="background:#fff8f5;border:1px solid rgba(217,64,0,0.2);border-radius:12px;padding:14px 16px;margin-bottom:20px;font-family:var(--fm);font-size:14px">
        <span style="color:#d94000;font-weight:700">${fmt(s)}</span> <span style="color:var(--tx3)">→</span> <span style="color:#d94000;font-weight:700">${fmt(e)}</span>
        <span style="color:var(--tx3);margin-left:8px">${dur} min</span>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-primary btn-full" id="btn-qb-confirm" style="background:#d94000;color:#fff;font-weight:800">Confirm Booking</button>
        <button class="btn btn-ghost btn-sm" onclick="A.closeQB()">Cancel</button>
      </div>
      ${S.qbErr?`<div class="error-box" style="margin-top:12px">${S.qbErr}</div>`:''}
    </div>
  </div>`;
}

function rBooking(){
  const isToday=S.bookDate.toDateString()===now().toDateString();
  const ev=(S.rooms[S.selRoom]||{events:[]}).events||[];
  const slots=genSlots(S.bookDate,ev);
  return`${S.bookMsg?`<div class="${S.bookMsg.ok?'success-box':'error-box'}">${S.bookMsg.text}</div>`:''}
  <div class="booking-layout">
    <div>
      <div class="card"><div class="card-title">Room</div>
        ${S.config.rooms.map((r,i)=>{
          const st=getCur((S.rooms[i]||{events:[]}).events||[])?'busy':'available';
          return`<div class="room-opt${i===S.selRoom?' sel':''}" onclick="A.selRoom(${i})">
            <div><div class="room-opt-name">${r.name}</div>${r.capacity?`<div style="font-size:11px;color:var(--tx3)">&#128101; ${r.capacity}</div>`:''}</div>
            <div class="ros-${st}">${st==='busy'?'&#9679; Busy':'&#9679; Free'}</div></div>`;
        }).join('')}
      </div>
      <div class="card"><div class="card-title">Date</div>
        <div class="date-nav">
          <button class="date-nav-btn" id="btn-pd">&#8249;</button>
          <div class="date-display">${isToday?'Today':fmtShort(S.bookDate)}</div>
          <button class="date-nav-btn" id="btn-nd">&#8250;</button>
        </div>
        <div style="text-align:center;font-size:12px;color:var(--tx2);margin-top:4px">${fmtDate(S.bookDate)}</div>
      </div>
      <div class="card"><div class="card-title">Duration</div>
        <div class="dur-grid">${[30,60,90,120].map(d=>`<div class="dur-btn${S.bookDur===d?' sel':''}" onclick="A.setDur(${d})">${d<60?d+'m':(d/60)+'h'}</div>`).join('')}</div>
      </div>
    </div>
    <div>
      <div class="card"><div class="card-title" style="margin-bottom:6px">Timeline &mdash; ${S.config.rooms[S.selRoom].name}</div>
        ${rTL(S.bookDate,ev)}
        <div style="display:flex;gap:14px;margin-top:8px;font-size:11px;color:var(--tx3)">
          <span><span style="color:var(--red)">&#9632;</span> Booked</span>
          <span><span style="color:var(--amber)">|</span> Now</span>
        </div>
      </div>
      <div class="card"><div class="card-title">Pick Start Time</div>
        <div class="slot-grid">${slots.map(s=>{
          const sel=S.bookStart&&tkKey(fromKey(S.bookStart))===s.key;
          return`<div class="slot-btn${s.busy?' busy':sel?' sel':''}" onclick="${s.busy?'':'A.selSlot(\''+s.key+'\')'}">${s.lbl}</div>`;
        }).join('')}</div>
      </div>
      ${S.bookStart?rConfirm():''}
    </div>
  </div>`;
}

function rTL(date,evs){
  const SH=8,EH=20,total=(EH-SH)*60,n=now();
  const isToday=date.toDateString()===n.toDateString();
  const nowPct=isToday?Math.min(100,Math.max(0,((n.getHours()-SH)*60+n.getMinutes())/total*100)):-1;
  const hrs=Array.from({length:(EH-SH)/2+1},(_,i)=>`<span class="tl-hour">${String(SH+i*2).padStart(2,'0')}:00</span>`).join('');
  const blocks=evs.map(e=>{
    const es=parseT(e.start.dateTime),ee=parseT(e.end.dateTime);
    const l=Math.max(0,((es.getHours()-SH)*60+es.getMinutes())/total*100);
    const w=Math.max(1,((ee-es)/60000)/total*100);
    if(l>=100||l<0)return'';
    return`<div class="tl-event" style="left:${l}%;width:${Math.min(w,100-l)}%" title="${e.subject||'Meeting'}">${e.subject||'&#9679;'}</div>`;
  }).join('');
  return`<div><div class="tl-labels">${hrs}</div><div class="tl-track">${nowPct>=0?`<div class="tl-now" style="left:${nowPct}%"></div>`:''}${blocks}</div></div>`;
}

function genSlots(date,evs){
  const slots=[],d=new Date(date);d.setHours(8,0,0,0);const end=new Date(date);end.setHours(19,0,0,0);const n=now();
  while(d<end){
    const s=new Date(d),e=new Date(d.getTime()+S.bookDur*60000);
    const past=date.toDateString()===n.toDateString()&&s<n;
    slots.push({key:tkKey(s),lbl:fmt(s),busy:isBusy(evs,s,e)||past});
    d.setMinutes(d.getMinutes()+30);
  }
  return slots;
}

function rConfirm(){
  const s=fromKey(S.bookStart),e=new Date(s.getTime()+S.bookDur*60000),room=S.config.rooms[S.selRoom];
  return`<div class="card" style="border-color:var(--ab)"><div class="card-title">Confirm Booking</div>
    <div class="bd">
      <div class="bd-item"><div class="bd-lbl">Room</div><div class="bd-val">${room.name}</div></div>
      <div class="bd-item"><div class="bd-lbl">Date</div><div class="bd-val">${fmtShort(S.bookDate)}</div></div>
      <div class="bd-item"><div class="bd-lbl">Time</div><div class="bd-val">${fmt(s)}&ndash;${fmt(e)}</div></div>
      <div class="bd-item"><div class="bd-lbl">Dur</div><div class="bd-val">${S.bookDur}m</div></div>
    </div>
    <div class="form-group"><label class="form-label">Meeting Title</label>
      <input class="form-input" id="b-title" placeholder="e.g. Team standup, Client call&hellip;"></div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-primary" id="btn-confirm">&#10003; Confirm</button>
      <button class="btn btn-ghost" onclick="A.clearBook()">Cancel</button>
    </div>
  </div>`;
}

function rAdmin(){
  const allEvs=S.config.rooms.flatMap((_,i)=>(S.rooms[i]||{events:[]}).events||[]);
  const busyMins=allEvs.reduce((a,e)=>a+(parseT(e.end.dateTime)-parseT(e.start.dateTime))/60000,0);
  const util=Math.round(busyMins/(S.config.rooms.length*12*60)*100);
  return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:22px">
    <div><h2 style="font-size:22px;font-weight:800">Admin Overview</h2>
      <div style="color:var(--tx2);font-size:13px;margin-top:3px">${fmtDate(now())}</div></div>
    <button class="btn btn-ghost btn-sm" id="btn-ref">&#8635; Refresh</button>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-val" style="color:var(--accent)">${allEvs.length}</div><div class="stat-lbl">Bookings Today</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--amber)">${util}%</div><div class="stat-lbl">Utilisation (8&ndash;20h)</div></div>
    <div class="stat-card"><div class="stat-val">${S.config.rooms.length}</div><div class="stat-lbl">Rooms Active</div></div>
  </div>
  <div class="admin-grid">${S.config.rooms.map((_,i)=>rAR(i)).join('')}</div>`;
}

function rAR(i){
  const room=S.config.rooms[i],d=S.rooms[i]||{events:[],loading:true};
  if(d.loading)return`<div class="card"><div class="loading"><div class="spinner"></div></div></div>`;
  const evs=d.events||[],cur=getCur(evs),st=cur?'busy':'available';
  const evHtml=evs.length===0?`<div class="empty">No bookings today</div>`:evs.map(e=>{
    const s=parseT(e.start.dateTime),en=parseT(e.end.dateTime),isc=cur?.id===e.id;
    return`<div class="ev-item${isc?' cur':''}">
      <div><div class="ev-title">${e.subject||'(No title)'}</div>
        <div class="ev-meta">${fmt(s)} &ndash; ${fmt(en)} &middot; ${Math.round((en-s)/60000)}min</div>
        ${e.organizer?.emailAddress?.name?`<div class="ev-org">${e.organizer.emailAddress.name}</div>`:''}</div>
      <button class="btn btn-danger btn-sm" onclick="A.cancel(${i},'${e.id}')">Cancel</button>
    </div>`;
  }).join('');
  return`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <div style="font-size:17px;font-weight:800">${room.name}</div>
      <div class="badge badge-${st}"><div class="dot dot-${st}"></div>${st==='busy'?'In Use':'Available'}</div>
    </div>
    <div style="font-size:11px;color:var(--tx3);margin-bottom:12px;font-family:var(--fm)">${room.email}</div>
    ${d.error?`<div class="error-box">&#9888; ${d.error}</div>`:''}
    ${rTL(now(),evs)}<div class="ev-list">${evHtml}</div>
  </div>`;
}

function bindSetup(){
  document.getElementById('btn-signin')?.addEventListener('click',async()=>{
    const tid=document.getElementById('s-tid')?.value?.trim(),cid=document.getElementById('s-cid')?.value?.trim();
    if(!tid||!cid){S.err='Tenant ID and Client ID are required.';render();return;}
    S.err=null;S.view='discovering';render();
    try{const tk=await signIn(tid,cid);await afterAuth({tenantId:tid,clientId:cid},tk);}
    catch(e){S.err=`Sign-in failed: ${e.message}`;S.view='setup';S.config=null;render();}
  });
  document.getElementById('btn-tok')?.addEventListener('click',async()=>{
    const tok=document.getElementById('s-tok')?.value?.trim();
    if(!tok){S.err='Please paste an access token.';render();return;}
    S.err=null;S.token=tok;S.view='discovering';render();
    try{await afterAuth({tenantId:'',clientId:''},tok);}
    catch(e){S.err=`Connection failed: ${e.message}`;S.view='setup';S.config=null;S.token=null;render();}
  });
  loadCfg().then(cfg=>{
    if(!cfg)return;
    const s=(id,v)=>{const el=document.getElementById(id);if(el&&v)el.value=v;};
    s('s-tid',cfg.tenantId);s('s-cid',cfg.clientId);
  });
}

async function afterAuth(base,tk){
  const found=await discoverRooms(tk);
  S.discovered=found;S.config={...base,rooms:[]};
  if(found.length===0){S.view='picker';render();return;}
  if(found.length<=2){S.config.rooms=found;await finish();}
  else{S.picked=[0,1];S.view='picker';render();}
}

function bindPicker(){
  document.getElementById('btn-back')?.addEventListener('click',()=>{
    S.view='setup';S.config=null;S.token=null;S.discovered=[];S.picked=[];render();
  });
  document.getElementById('btn-use')?.addEventListener('click',async()=>{
    if(S.picked.length===0){S.err='Select at least one room.';render();return;}
    S.config.rooms=S.picked.map(i=>S.discovered[i]);await finish();
  });
}

async function finish(){
  S.rooms=S.config.rooms.map(()=>({events:[],loading:false,error:null}));
  S.selRoom=0;S.view='panel';await saveCfg(S.config);render();
  await loadAll(new Date());render();startRefresh();
}

function bindMain(){
  document.querySelectorAll('.nav-tab').forEach(b=>b.addEventListener('click',()=>{
    S.view=b.dataset.v;S.bookMsg=null;loadAll(S.view==='booking'?S.bookDate:new Date()).then(render);render();
  }));
  document.getElementById('btn-so')?.addEventListener('click',()=>{
    stopRefresh();Object.assign(S,{view:'setup',config:null,msalInstance:null,account:null,token:null,rooms:[],discovered:[],picked:[],err:null,bookMsg:null});render();
  });
  document.getElementById('btn-ref')?.addEventListener('click',()=>{loadAll(S.view==='booking'?S.bookDate:new Date()).then(render);});
  document.getElementById('btn-pd')?.addEventListener('click',()=>{S.bookDate=new Date(S.bookDate.getTime()-86400000);S.bookStart=null;loadAll(S.bookDate).then(render);render();});
  document.getElementById('btn-nd')?.addEventListener('click',()=>{S.bookDate=new Date(S.bookDate.getTime()+86400000);S.bookStart=null;loadAll(S.bookDate).then(render);render();});
  document.getElementById('btn-qb-confirm')?.addEventListener('click',async()=>{
    const title=document.getElementById('qb-title')?.value?.trim();
    if(!title){S.qbErr='Please enter a meeting title.';render();return;}
    const s=new Date(),e=new Date(s.getTime()+S.qbDur*60000),room=S.config.rooms[S.qb];
    try{
      await createBooking(room.email,title,s,e);
      S.qb=null;S.qbErr=null;
      S.bookMsg={ok:true,text:`&#9889; "${title}" booked in ${room.name} &middot; ${fmt(s)} &ndash; ${fmt(e)}`};
      await loadAll(new Date());render();
      setTimeout(()=>{S.bookMsg=null;render();},7000);
    }catch(err){S.qbErr=`Failed: ${err.message}`;render();}
  });
  document.getElementById('btn-confirm')?.addEventListener('click',async()=>{
    const title=document.getElementById('b-title')?.value?.trim();
    if(!title){S.bookMsg={ok:false,text:'Please enter a meeting title.'};render();return;}
    const s=fromKey(S.bookStart),e=new Date(s.getTime()+S.bookDur*60000),room=S.config.rooms[S.selRoom];
    try{
      await createBooking(room.email,title,s,e);
      S.bookMsg={ok:true,text:`Booked "${title}" in ${room.name} from ${fmt(s)} to ${fmt(e)}`};
      S.bookStart=null;await loadAll(S.bookDate);render();
      setTimeout(()=>{S.bookMsg=null;render();},6000);
    }catch(e){S.bookMsg={ok:false,text:`Booking failed: ${e.message}`};render();}
  });
}

function startRefresh(){
  stopRefresh();
  S.refreshId=setInterval(async()=>{if(S.view==='panel'||S.view==='admin'){await loadAll(new Date());render();}},30000);
  S.clockId=setInterval(()=>{const el=document.getElementById('pclock');if(el)el.textContent=fmt(now());},1000);
}
function stopRefresh(){if(S.refreshId){clearInterval(S.refreshId);S.refreshId=null;}if(S.clockId){clearInterval(S.clockId);S.clockId=null;}}

return{
  togglePick:(i)=>{if(S.picked.includes(i))S.picked=S.picked.filter(x=>x!==i);else if(S.picked.length<2)S.picked=[...S.picked,i];render();},
  retry:(i)=>{loadRoom(i,S.view==='booking'?S.bookDate:new Date()).then(render);},
  openQB:(i)=>{S.qb=i;S.qbDur=30;S.qbErr=null;render();},
  closeQB:()=>{S.qb=null;S.qbErr=null;render();},
  setQBDur:(d)=>{S.qbDur=d;render();},
  quickBook:(i)=>{S.selRoom=i;S.view='booking';S.bookDate=new Date();loadAll(S.bookDate).then(render);render();},
  goBook:(i)=>{S.selRoom=i;S.view='booking';render();},
  selRoom:(i)=>{S.selRoom=i;S.bookStart=null;loadRoom(i,S.bookDate).then(render);render();},
  setDur:(d)=>{S.bookDur=d;S.bookStart=null;render();},
  selSlot:(k)=>{S.bookStart=k;render();},
  clearBook:()=>{S.bookStart=null;render();},
  cancel:async(i,eid)=>{
    if(!confirm('Cancel this booking?'))return;
    try{await cancelEvent(S.config.rooms[i].email,eid);await loadRoom(i,new Date());render();}
    catch(e){alert('Could not cancel: '+e.message);}
  },
  init:async()=>{
    // Handle redirect return from Microsoft login
    const pendingCfg=sessionStorage.getItem('oq-pending-cfg');
    if(pendingCfg&&window.msal){
      try{
        const cfg=JSON.parse(pendingCfg);
        const ok=await initMsal(cfg.tenantId,cfg.clientId);
        if(ok){
          const result=await S.msalInstance.handleRedirectPromise();
          if(result&&result.account){
            sessionStorage.removeItem('oq-pending-cfg');
            S.account=result.account;
            S.config=cfg;
            const tk=result.accessToken;
            await afterAuth(cfg,tk);
            return;
          }
        }
      }catch(e){
        sessionStorage.removeItem('oq-pending-cfg');
        console.error('Redirect handle error:',e);
      }
    }
    render();
  }
};
})();
window.A=App;App.init();
</script>
</body>
</html>
